<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Contact</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <img src="resources/Logo.svg" alt="Company icon">
    </div>
  </header>
 
  <main class="container">

    <h1>Interested in our business pricing?</h1>

    <p class="subtitle">
      Fill out the form to view details and we’ll contact you as soon as possible.
    </p>

    <div class="card">

      <form class="form">

        <div class="row">
          <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Ethan Johnson" required>
          </div>

          <div class="input-group">
            <label>Company Email</label>
            <input type="email" placeholder="ethan@johnson.com" required>
          </div>
        </div>

        <div class="row">
          <div class="input-group">
            <label>Company Size</label>
            <select required>
              <option selected>50–100 employees</option>
              <option>1–10 employees</option>
              <option>10–50 employees</option>
              <option>100+ employees</option>
            </select>
          </div>

          <div class="input-group">
            <label>Subject</label>
            <select required>
              <option selected>Building Landing pages</option>
              <option>Web Development</option>
              <option>UI/UX Design</option>
            </select>
          </div>
        </div>

        <div class="input-group full">
          <label>Message</label>
          <textarea placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="btn">
          Contact Sales
        </button>

      </form>

    </div>

  </main>

</body>
</html>
